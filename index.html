<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuTruth - Real Price Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #video-container { position: relative; overflow: hidden; border-radius: 1rem; }
        #canvas-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
        .scanning-line {
            position: absolute; width: 100%; height: 2px; background: rgba(34, 197, 94, 0.5);
            box-shadow: 0 0 15px 5px rgba(34, 197, 94, 0.5); animation: scan 2s infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md text-center mb-6">
        <h1 class="text-3xl font-bold text-green-400">MenuTruth</h1>
        <p class="text-slate-400 text-sm">See the "All-In" price instantly.</p>
    </header>

    <div class="w-full max-w-md bg-slate-800 p-4 rounded-2xl mb-4 shadow-xl border border-slate-700">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-1">Local Tax (%)</label>
                <input type="number" id="taxInput" value="8.5" step="0.1" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-xs uppercase font-bold text-slate-500 mb-1">Desired Tip (%)</label>
                <input type="number" id="tipInput" value="20" step="1" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-green-500">
            </div>
        </div>
    </div>

    <div id="video-container" class="w-full max-w-md aspect-[3/4] bg-black border-2 border-slate-700 shadow-2xl relative">
        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        <div id="scanLine" class="scanning-line hidden"></div>
        <canvas id="canvas-overlay" class="w-full h-full"></canvas>
    </div>

    <div class="w-full max-w-md mt-6">
        <button id="scanBtn" class="w-full bg-green-500 hover:bg-green-600 text-slate-900 font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
            SCAN MENU PRICES
        </button>
        <div id="status" class="mt-4 text-center text-slate-400 italic text-sm">Waiting for camera...</div>
    </div>

    <div id="resultsBoard" class="w-full max-w-md mt-4 space-y-2"></div>

    <script>
        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scanBtn');
        const status = document.getElementById('status');
        const scanLine = document.getElementById('scanLine');
        const resultsBoard = document.getElementById('resultsBoard');

        // Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                video.srcObject = stream;
                status.innerText = "Ready to scan.";
            } catch (err) {
                status.innerText = "Camera error: " + err.message;
            }
        }

        // Logic to apply Tax + Tip
        function calculateRealPrice(originalPrice) {
            const tax = parseFloat(document.getElementById('taxInput').value) / 100;
            const tip = parseFloat(document.getElementById('tipInput').value) / 100;
            const subtotalWithTax = originalPrice * (1 + tax);
            return (subtotalWithTax * (1 + tip)).toFixed(2);
        }

        // OCR Scan Execution
        scanBtn.onclick = async () => {
            status.innerText = "Analyzing menu...";
            scanLine.classList.remove('hidden');
            resultsBoard.innerHTML = '';

            // Capture current frame
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // Run Tesseract
            try {
                const result = await Tesseract.recognize(canvas, 'eng');
                scanLine.classList.add('hidden');
                
                // Regex to find prices like 12.99, 15.00, etc.
                const priceRegex = /\d+\.\d{2}/g;
                const foundPrices = result.data.text.match(priceRegex);

                if (foundPrices) {
                    status.innerText = `Found ${foundPrices.length} prices!`;
                    foundPrices.forEach(price => {
                        const original = parseFloat(price);
                        const real = calculateRealPrice(original);
                        
                        const div = document.createElement('div');
                        div.className = "flex justify-between bg-slate-800 p-3 rounded-lg border-l-4 border-green-500";
                        div.innerHTML = `
                            <span class="text-slate-400">Menu: $${original}</span>
                            <span class="font-bold text-green-400">Real: $${real}</span>
                        `;
                        resultsBoard.appendChild(div);
                    });
                } else {
                    status.innerText = "No prices detected. Try a closer shot.";
                }
            } catch (e) {
                status.innerText = "Error: " + e.message;
                scanLine.classList.add('hidden');
            }
        };

        startCamera();
    </script>
</body>
</html>
